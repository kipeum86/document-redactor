packages:
  - .
minimumReleaseAge: 10080
blockExoticSubdeps: true
strictDepBuilds: true
trustPolicy: no-downgrade
ignoreScripts: false
allowBuilds:
  "@swc/core": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  "@google/genai": false
  ljharb-monorepo-symlink-test: false
  msw: false
  protobufjs: false
trustPolicyExclude:
  - undici-types@6.21.0
  - chokidar@4.0.3
  - vite@5.4.21
